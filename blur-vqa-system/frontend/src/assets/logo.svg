<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eyeGradient" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <radialGradient id="irisGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#93C5FD" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path
    d="M20 110 Q110 20 200 110 Q110 200 20 110 Z"
    fill="url(#eyeGradient)"
    filter="url(#softGlow)"
  />

  <ellipse cx="110" cy="110" rx="55" ry="35" fill="white" opacity="0.9" />
  <circle cx="110" cy="110" r="22" fill="url(#irisGradient)" />
  <circle cx="110" cy="110" r="10" fill="#0F172A" />
  <circle cx="118" cy="102" r="4" fill="white" opacity="0.9" />
  <circle cx="85" cy="120" r="2.5" fill="#3B82F6" />
  <circle cx="140" cy="125" r="2.5" fill="#3B82F6" />
  <circle cx="130" cy="95" r="2.5" fill="#3B82F6" />
</svg>
